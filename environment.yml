name: shs-analysis
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.10

  # Core data science
  - pandas>=2.0.0
  - numpy>=1.24.0
  - scipy>=1.10.0

  # Visualization
  - plotly>=5.15.0

  # Statistics & modeling
  - statsmodels>=0.14.0
  - scikit-learn>=1.3.0

  # Notebook & utilities
  - jupyter>=1.0.0
  - jupyterlab>=4.0.0
  - ipykernel>=6.25.0

  # Optional: for enhanced notebooks
  - notebook>=7.0.0
  - nbconvert>=7.8.0

  # System utilities
  - pip>=23.0

  # Pip packages (installed after conda)
  - pip:
      - kaleido>=0.2.1  # static image export (not on conda win-64)
      - plotly-resampler>=0.9.0
